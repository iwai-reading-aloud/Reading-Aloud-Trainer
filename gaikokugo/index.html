}

function switchSplitSentence(index) {
    if (!Number.isInteger(index) || index < 0 || index >= lessonData.length) return;
    stopSplitPlayback();
    splitIndex = index;
    selectedIndex = index;
    splitForceVisibility = {};
    updateDisplay();
}

function getSplitPlainLinesForCurrent() {
    const item = lessonData[splitIndex];
    return getSplitLines(item).map(line => plainLine(line)).filter(Boolean);
}

function playOneSplitLine(index) {
    const splitLines = getSplitPlainLinesForCurrent();
    const text = splitLines[index];
    if (!text) return;

    stopSplitPlayback();
    splitStopped = true;
    splitLoopMode = false;

    const selectedVoice = getUsEnglishVoiceOrNull();
    if (!selectedVoice && isIOSDevice()) {
        splitStopped = true;
        splitLoopMode = false;
        updateSplitModeClasses();
        return;
    }

    const utterance = new SpeechSynthesisUtterance(text);
    if (selectedVoice) utterance.voice = selectedVoice;
    utterance.lang = "en-US";
    utterance.rate = Number(splitSettings.speed || 0.9);
    utterance.pitch = 1.0;

    markCurrentSplitLine(index);
    utterance.onend = () => {
        // 各分割のPLAYでは、音声終了後も最後に練習した分割のハイライトを残す。
        // これにより、学生が現在の練習位置を見失いにくくなる。
        splitCurrentLineIndex = index;
        markCurrentSplitLine(index);
    };
    speechSynthesis.speak(utterance);
}

function speakSplitLineAt(index) {
    const splitLines = getSplitPlainLinesForCurrent();
    clearSplitPauseTimer();

    if (splitStopped) return;

    if (index >= splitLines.length) {
        if (splitLoopMode) {
            splitPauseTimer = setTimeout(() => {
                splitCurrentLineIndex = 0;
                speakSplitLineAt(0);
                // LOOPで先頭分割へ戻るときは、先頭分割そのものではなく、
                // その1行上の一括ON/OFFボタン行が見える位置まで戻す。
                requestAnimationFrame(() => {
                    const globalToggleRow = document.querySelector(".mobile-split-global-toggle-row");
                    const firstRow = document.getElementById("mobile-split-row-0");
                    const scrollTarget = globalToggleRow || firstRow;
                    if (scrollTarget) {
                        scrollTarget.scrollIntoView({ behavior: "smooth", block: "start" });
                    }
                });
            }, Number(splitSettings.pause || "0"));
        } else {
            splitStopped = true;
            splitCurrentLineIndex = 0;
            updateSplitModeClasses();
            // 上部PLAYで全分割の再生が終わったら、一括ON/OFFボタン行が見える位置まで戻し、
            // 先頭分割をハイライトしたまま停止する。
            markCurrentSplitLine(0);
            const globalToggleRow = document.querySelector(".mobile-split-global-toggle-row");
            const firstRow = document.getElementById("mobile-split-row-0");
            const scrollTarget = globalToggleRow || firstRow;
            if (scrollTarget) {
                scrollTarget.scrollIntoView({ behavior: "smooth", block: "start" });
            }
        }
        return;
    }

    splitCurrentLineIndex = index;
    markCurrentSplitLine(index);
    speechSynthesis.cancel();

    const selectedVoice = getUsEnglishVoiceOrNull();
    if (!selectedVoice && isIOSDevice()) {
        splitStopped = true;
        splitLoopMode = false;
        updateSplitModeClasses();
        return;
    }

    const utterance = new SpeechSynthesisUtterance(splitLines[index]);
    if (selectedVoice) utterance.voice = selectedVoice;
    utterance.lang = "en-US";
    utterance.rate = Number(splitSettings.speed || 0.9);
    utterance.pitch = 1.0;

    utterance.onend = () => {
        if (splitStopped) return;
        splitPauseTimer = setTimeout(() => {
            speakSplitLineAt(index + 1);
        }, Number(splitSettings.pause || "0"));
    };

    speechSynthesis.speak(utterance);
}

function playSplit() {
    const splitLines = getSplitPlainLinesForCurrent();
    if (!splitLines.length) return;
    splitStopped = false;
    splitLoopMode = false;
    splitCurrentLineIndex = 0;
    updateSplitModeClasses();
    speakSplitLineAt(0);
}

function toggleSplitLoop() {
    splitLoopMode = !splitLoopMode;
    updateSplitModeClasses();

    if (splitLoopMode) {
        splitStopped = false;
        splitCurrentLineIndex = 0;
        speakSplitLineAt(0);
    } else {
        stopSplitPlayback();
    }
}

function toggleSplitLineVisibility(index) {
    const current = splitForceVisibility[index] || "";
    if (splitSettings.hideLines) {
        splitForceVisibility[index] = current === "show" ? "" : "show";
    } else {
        splitForceVisibility[index] = current === "hide" ? "" : "hide";
    }

    const row = document.getElementById("mobile-split-row-" + index);
    if (row) {
        row.classList.remove("split-line-force-show", "split-line-force-hide");
        if (splitForceVisibility[index] === "show") row.classList.add("split-line-force-show");
        if (splitForceVisibility[index] === "hide") row.classList.add("split-line-force-hide");
    }
    updateSplitLineToggleButton(index);
}

function releaseButtonVisualState(btn) {
    if (!btn || typeof btn.blur !== "function") return;
    // iPhone Safari/PWAではタップ後に :hover/:focus が残ることがあるため、
    // 操作直後にフォーカスを外して、変色が継続しないようにする。
    setTimeout(() => {
        try { btn.blur(); } catch (e) {}
        if (document.activeElement && document.activeElement !== document.body && document.activeElement.blur) {
            try { document.activeElement.blur(); } catch (e) {}
        }
    }, 0);
}

document.addEventListener("pointerup", (e) => {
    const btn = e.target.closest && e.target.closest("button");
    if (btn) releaseButtonVisualState(btn);
}, true);

document.addEventListener("touchend", (e) => {
    const btn = e.target.closest && e.target.closest("button");
    if (btn) releaseButtonVisualState(btn);
}, true);

document.addEventListener("click", (e) => {
    const btn = e.target.closest("button");
    if (!btn) return;
    releaseButtonVisualState(btn);
    if (btn.classList.contains("loop-on") || btn.classList.contains("loop-active")) return;
    btn.classList.remove("clicked-feedback");
    void btn.offsetWidth;
    btn.classList.add("clicked-feedback");
    setTimeout(() => {
        btn.classList.remove("clicked-feedback");
        releaseButtonVisualState(btn);
    }, 240);
});

speedSlider.addEventListener("input", e => {
    speedVal.textContent = Number(e.target.value).toFixed(2) + "x";
});

[hideVocabToggle, hideJpToggle, hideEnglish].forEach(el => el.addEventListener("change", refreshClasses));


let lessonTouchStartX = 0;
let lessonTouchStartY = 0;

document.addEventListener("touchstart", function(e) {
    if (!document.body.classList.contains("lesson-mode") && !document.body.classList.contains("split-mode")) return;
    if (!e.touches || !e.touches.length) return;
    const target = e.target;
    if (target && target.closest && target.closest("button, input, select, .sentence-sheet, .sentence-sheet-backdrop")) return;
    lessonTouchStartX = e.touches[0].clientX;
    lessonTouchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener("touchend", function(e) {
    if (!document.body.classList.contains("lesson-mode") && !document.body.classList.contains("split-mode")) return;
    if (!e.changedTouches || !e.changedTouches.length) return;
    const target = e.target;
    if (target && target.closest && target.closest("button, input, select, .sentence-sheet, .sentence-sheet-backdrop")) return;
    const dx = e.changedTouches[0].clientX - lessonTouchStartX;
    const dy = e.changedTouches[0].clientY - lessonTouchStartY;

    if (document.body.classList.contains("lesson-mode") && dx > 80 && Math.abs(dy) < 60) {
        // 1文練習画面：右方向スワイプで分割練習へ
        openSplitPractice(getActiveIndex());
    } else if (document.body.classList.contains("lesson-mode") && dx < -80 && Math.abs(dy) < 60) {
        // 1文練習画面：左方向スワイプで教材一覧へ
        showLibraryHome();
    } else if (document.body.classList.contains("split-mode") && dx < -80 && Math.abs(dy) < 60) {
        // 分割練習画面：左方向スワイプで1文練習へ
        closeSplitPractice();
    }
}, { passive: true });

speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();
try {
    if (getCurrentLibraryFile()) {
        loadLibraryFromServer(false);
    } else {
        updateDisplay();
    }
} catch (e) {
    updateDisplay();
}

if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {
            // Service Worker登録に失敗しても、通常のWebアプリとして動作します。
        });
    });
}

</script>
</body>
</html>
